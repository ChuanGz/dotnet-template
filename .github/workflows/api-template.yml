name: API template
on: [push, pull_request]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - run: bash tests/m4/run.sh
      - run: bash tests/m5/run.sh
      - run: bash tests/m6/run.sh
      - run: bash tests/m7/run.sh
      - run: bash tests/m8/run.sh
