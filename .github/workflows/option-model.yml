name: Option model
on: [push, pull_request]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Validate contract and compatibility cases
        run: dotnet run --project src/DotNetTemplate.OptionModel -- --model config/template-options.json --test tests/options/cases.json
