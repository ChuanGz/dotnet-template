name: Security scan
on: [push, pull_request]
permissions:
  contents: read
jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual
      - name: Generate CodeQL target
        run: |
          dotnet new install ./template/content
          dotnet new dotnet-service -n CodeQL.Generated -o .codeql-generated --dotnet-version net10.0
      - name: Build CodeQL target
        run: dotnet build .codeql-generated/CodeQL.Generated.csproj --configuration Release
      - uses: github/codeql-action/analyze@v4
  filesystem:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
